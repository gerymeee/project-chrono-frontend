<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>Happy Valentine's Day 2026</title>
  <link rel="stylesheet" href="letterStylepg2.css" />
  <link rel="icon" href="favicons/fav1.png" type="image/png" />
</head> 
<body>
  <div class="preloader"></div>
  <div class="petals-container"></div>
  <img id="bgPreload" src="bg/background3.png" style="display: none;" />

  <a href="index.html" class="back-button" aria-label="Go Back">&#8592;</a>

  <div class="center-stage">
    
    <div class="orbit-gallery ring-1">
      <img src="Images/pic15.jpg" class="photo" style="animation-delay: -5s; --r: 5deg;" alt="Memory">
      <img src="Images/pic16.jpeg"  class="photo" style="animation-delay: -35s; --r: -3deg;" alt="Memory">
      <img src="Images/pic17.jpeg" class="photo" style="animation-delay: -65s; --r: 10deg;" alt="Memory">
      <img src="Images/pic18.jpeg" class="photo" style="animation-delay: -90s; --r: -5deg;" alt="Memory">
    </div>

    <div class="orbit-gallery ring-2">
      <img src="Images/pic19.jpeg" class="photo" style="animation-delay: -10s; --r: 8deg;" alt="Memory">
      <img src="Images/pic20.jpeg" class="photo" style="animation-delay: -40s; --r: -8deg;" alt="Memory">
      <img src="Images/pic21.jpeg" class="photo" style="animation-delay: -70s; --r: 4deg;" alt="Memory">
      <img src="Images/pic22.jpeg" class="photo" style="animation-delay: -25s; --r: -2deg;" alt="Memory">
    </div>

    <div class="orbit-gallery ring-3">
      <img src="Images/pic23.jpeg" class="photo" style="animation-delay: -2s; --r: 6deg;" alt="Memory">
      <img src="Images/pic24.jpeg" class="photo" style="animation-delay: -20s; --r: -6deg;" alt="Memory">
      <img src="Images/pic25.jpg" class="photo" style="animation-delay: -45s; --r: 12deg;" alt="Memory">
      <img src="Images/pic26.jpg" class="photo" style="animation-delay: -55s; --r: -4deg;" alt="Memory">
    </div>

    <div class="sealed-card-container" id="envelopeArea">
        <div class="wax-seal" id="sealBtn">
            <span>Open<br>Me</span>
        </div>
        
        <div class="letter-content">
          <div class="close-btn" id="closeBtn">&times;</div>
          
          <div class="text-scroll-wrapper">
              <p id="letter-content">
                Loading...
              </p>
          </div>
        </div>
    </div>

  </div>

  <div class="controls">
      <button id="playPauseBtn">Play Music</button>
  </div>
  
  <audio id="myAudio" loop>
    <source src="music/Blue.mp3" type="audio/mpeg" />
  </audio>

  <footer>
    <p>Lovingly crafted by <a href="#" id="name-link">Geryme</a></p>
  </footer>

  <script>
    const audio = document.getElementById('myAudio');
    const btn = document.getElementById('playPauseBtn');
    btn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); btn.textContent = 'Pause Music'; } 
      else { audio.pause(); btn.textContent = 'Play Music'; }
    });

    const envelopeArea = document.getElementById('envelopeArea');
    const sealBtn = document.getElementById('sealBtn');
    const closeBtn = document.getElementById('closeBtn'); // Get the close button
    
    // Open Logic
    sealBtn.addEventListener('click', function() {
        envelopeArea.classList.add('open');
    });

    // Close Logic
    closeBtn.addEventListener('click', function() {
        envelopeArea.classList.remove('open');
    });

    const bg = document.getElementById('bgPreload');
    function removePreloader() { document.body.classList.add('loaded'); }
    if (bg.complete) { removePreloader(); } else { bg.onload = removePreloader; }
    setTimeout(removePreloader, 1000);

    /* --- PETAL GENERATOR (Slower & Smoother) --- */
    const petalContainer = document.querySelector('.petals-container');
    
    function createPetals() {
      // Create 30 petals (Reduced count slightly for cleaner look)
      for (let i = 0; i < 30; i++) {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        
        // Randomize positioning
        petal.style.left = Math.random() * 100 + 'vw'; 
        
        // SLOWER SPEED: Random between 15s and 25s
        petal.style.animationDuration = Math.random() * 10 + 15 + 's'; 
        
        petal.style.animationDelay = Math.random() * -25 + 's'; // Start scattered
        
        // Randomize size slightly for variety
        const size = Math.random() * 10 + 10 + 'px'; // 10px to 20px
        petal.style.width = size;
        petal.style.height = size;
        
        petalContainer.appendChild(petal);
      }
    }
    
    createPetals();
  </script>

  <script>
    const userToken = localStorage.getItem('memoryCapsuleToken');
    const BACKEND_URL = 'https://project-chrono-backend.vercel.app/api/letter2';

    fetch(BACKEND_URL, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${userToken}`,
        'Content-Type': 'application/json'
      }
    })
      .then(response => {
        if(!response.ok) {
          throw new Error('Unauthorized Access!');
        }
        return response.json();
      })
      .then(data => {
        if(data.success) {
          document.getElementById('letter-content').innerHTML = data.content;
        }
      })
      .catch(error => {
        document.getElementById('letter-content').innerHTML = `
        <div style="text-align: center; margin-top: 80px;">
          <span>Sealed Memory</span>
          <br /><br />
          You are currently viewing as a guest.<br />
          You are not authorized to view the contents of this letter,<br />
          but please feel free to enjoy the photos beside it!
          <br /><br /><br />
          <span class="ullu">
            Enjoy!
        </span>
      </div>
        `;
      });
  </script>

</body>
</html>
