<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 21st Birthday</title>
  <link rel="stylesheet" href="letterStylepg4.css" />
  <link rel="icon" href="favicons/fav1.png" type="image/png" />
</head>
<body>

  <div class="sparkle-particles" id="sparkles"></div>

  <a href="index.html" class="back-button" aria-label="Go Back">&#8592;</a>
  <button id="playPauseBtn" class="music-btn">🎵 Play Music</button>
  <audio id="myAudio" loop><source src="music/happy-bd-elegant.mp3" type="audio/mpeg" /></audio>

  <div class="horizontal-gallery">

    <div class="slide" id="heroSlide">
      <div class="spotlight-wrapper">
        <div class="spotlight-content" id="spotlight">
          <h1 class="golden-title glimmer-text">Twenty One</h1>
          <p style="font-size: 1.2rem; letter-spacing: 8px; color: #fff; text-transform: uppercase;">A Celebration of You</p>
        </div>
      </div>
      <div class="swipe-hint">Scroll Right ➜</div>
    </div>

    <div class="slide editorial-slide">
      <div class="slide-nav left" onclick="moveSlide(-1)">&#10094;</div>
      <div class="slide-nav right" onclick="moveSlide(1)">&#10095;</div>

      <div class="editorial-container layout-1">
        <div class="editorial-chapter">To My Favorite Person</div>
        
        <div class="editorial-img-wrapper">
          <img src="Images/pic35.jpg" alt="Memory">
        </div>
        
        <div class="editorial-text" id="msg-part-1">
          Loading...
        </div>
      </div>
    </div>

    <div class="slide editorial-slide">
      <div class="slide-nav left" onclick="moveSlide(-1)">&#10094;</div>
      <div class="slide-nav right" onclick="moveSlide(1)">&#10095;</div>

      <div class="editorial-container layout-2">
        <div class="editorial-chapter">The Beauty of Twenty-One</div>
        
        <div class="editorial-img-wrapper">
          <img src="Images/pic34.jpg" alt="Memory">
        </div>
        
        <div class="editorial-text" id="msg-part-2">
          Loading...
        </div>
      </div>
    </div>

    <div class="slide editorial-slide">
      <div class="slide-nav left" onclick="moveSlide(-1)">&#10094;</div>
      <div class="slide-nav right" onclick="moveSlide(1)">&#10095;</div>

      <div class="editorial-container layout-3">
        <div class="editorial-chapter">Every Birthday, Always</div>
        
        <div class="editorial-img-wrapper">
          <img src="Images/pic33.jpg" alt="Memory">
        </div>
        
        <div class="editorial-text" id="msg-part-3">
          Loading...
        </div>
      </div>
    </div>

    <div class="slide editorial-slide">
      <div class="slide-nav left" onclick="moveSlide(-1)">&#10094;</div>

      <div class="finale-content">
        <h2 class="finale-title">Happy Birthday</h2>
        <div id="msg-part-4" class="finale-message">Loading...</div>
        <div id="msg-sig" class="finale-signature"></div>
      </div>
    </div>

  </div>

  <footer>
    <p>Lovingly crafted by <a href="#" id="name-link">Geryme</a></p>
  </footer>

  <script>
    // 1. MUSIC CONTROLS
    const audio = document.getElementById('myAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    playPauseBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); playPauseBtn.innerHTML = '⏸ Pause Music'; } 
      else { audio.pause(); playPauseBtn.innerHTML = '🎵 Play Music'; }
    });

    // 2. THE FLASHLIGHT HERO EFFECT
    const heroSlide = document.getElementById('heroSlide');
    const spotlight = document.getElementById('spotlight');
    
    function updateSpotlight(e) {
      let x = e.clientX || (e.touches && e.touches[0].clientX);
      let y = e.clientY || (e.touches && e.touches[0].clientY);
      spotlight.style.setProperty('--mouseX', x + 'px');
      spotlight.style.setProperty('--mouseY', y + 'px');
    }
    heroSlide.addEventListener('mousemove', updateSpotlight);
    heroSlide.addEventListener('touchmove', updateSpotlight);

    // 3. HORIZONTAL SCROLL OBSERVER
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
        }
      });
    }, { threshold: 0.5 }); 

    document.querySelectorAll('.slide').forEach(slide => observer.observe(slide));

    // 4. PARTICLE SPARKLE GENERATOR
    const particleContainer = document.getElementById('sparkles');
    for (let i = 0; i < 40; i++) {
      let particle = document.createElement('div');
      particle.classList.add('particle');
      let size = Math.random() * 4 + 2 + 'px';
      particle.style.width = size;
      particle.style.height = size;
      particle.style.left = Math.random() * 100 + 'vw';
      
      particle.style.animationDuration = Math.random() * 20 + 20 + 's';
      particle.style.animationDelay = Math.random() * 10 + 's';
      
      let colorType = Math.random() > 0.5 ? '#fbd3a1' : '#ffdae0';
      particle.style.background = `radial-gradient(circle at center, ${colorType} 0%, transparent 80%)`;
      particle.style.boxShadow = `0 0 10px ${colorType}`;
      particleContainer.appendChild(particle);
    }

    // 5. IN-SLIDE NAVIGATION
    function moveSlide(direction) {
      const gallery = document.querySelector('.horizontal-gallery');
      gallery.scrollBy({ left: direction * window.innerWidth, behavior: 'smooth' });
    }
  </script>

  <script>
    const userToken = localStorage.getItem('memoryCapsuleToken');
    const BACKEND_URL = 'https://project-chrono-backend.vercel.app/api/letter4';

    fetch(BACKEND_URL, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${userToken}`,
        'Content-Type': 'application/json'
      }
    })
      .then(response => {
        if(!response.ok) {
          throw new Error('Unauthorized Access!');
        }
        return response.json();
      })
      .then(data => {
        if(data.success) {
          document.getElementById('msg-part-1').innerHTML = data.part1;
          document.getElementById('msg-part-2').innerHTML = data.part2;
          document.getElementById('msg-part-3').innerHTML = data.part3;
          document.getElementById('msg-part-4').innerHTML = data.part4;

          if (document.getElementById('msg-sig')) {
            document.getElementById('msg-sig').innerHTML = data.sig;
          }
        }
      })
      .catch(error => {
  
        const guestMessage = `
        <div style="text-align: center; margin-top: 20px;">
          You are currently viewing as a guest.<br />
          You are not authorized to view the contents,<br />
          but please feel free to enjoy the photos beside it!
        </div>
        `;

        const guestMessageLast = `
        <div style="text-align: center; margin-top: 20px;">
          You are currently viewing as a guest.<br />
          You are not authorized to view the contents!
        </div>
        `;

        document.getElementById('msg-part-1').innerHTML = guestMessage;
        document.getElementById('msg-part-2').innerHTML = guestMessage;
        document.getElementById('msg-part-3').innerHTML = guestMessage;
        document.getElementById('msg-part-4').innerHTML = guestMessageLast;
        
        if (document.getElementById('msg-sig')) {
          document.getElementById('msg-sig').innerHTML = '';
        }
      });
  </script>

</body>
</html>
