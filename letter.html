<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 20th Birthday</title>
  <link rel="stylesheet" href="letterStyle.css" />
  <link rel="icon" href="favicons/fav1.png" type="image/png" />
</head> 
<body>
  <!-- Preloader -->
  <div class="preloader"></div>

  <img id="bgPreload" src="bg/background2.png" style="display: none;" />

  <a href="index.html" class="back-button" aria-label="Go Back">
    &#8592;
  </a>

  <div class="container">
    <!-- Left side: The Letter -->
    <div class="letter-section">
      <div class="postcard1"></div>
      <div class="postcard">
        <p id="letter-content">
          Loading...
        </p>
      </div>
    </div>

    <div class="albums-section">
      <div class="gallery album1">
        <img src="Images/pic1.jpeg">
        <img src="Images/pic0.jpg">
        <img src="Images/pic3.jpeg">
        <img src="Images/pic4.jpeg">
        <img src="Images/pic11.jpg">
      </div>
      <div class="gallery album2">
        <img src="Images/pic5.jpeg">
        <img src="Images/pic7.jpeg">
        <img src="Images/pic14.jpg">
        <img src="Images/pic9.jpeg">
        <img src="Images/pic13.jpg">
      </div>
    </div>
  </div>

  <audio id="myAudio" loop>
    <source src="music/music1.mp3" type="audio/mpeg" />
    Your browser does not support the audio element.
  </audio>
  <button id="playPauseBtn">Play Music</button>

  <script>
    const audio = document.getElementById('myAudio');
    const btn = document.getElementById('playPauseBtn');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        btn.textContent = 'Pause Music';
      } else {
        audio.pause();
        btn.textContent = 'Play Music';
      }
    });

    const bg = document.getElementById('bgPreload');
    bg.onload = function() {
      document.body.classList.add('loaded');
    };
  </script>

  <script>
    const BACKEND_URL = 'https://project-chrono-backend.vercel.app/api/letter1';
    const userToken = localStorage.getItem('memoryCapsuleToken');

    fetch(BACKEND_URL, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${userToken}`,
        'Content-Type': 'application/json'
      }
    })
      .then(response => {
        if(!response.ok) {
          throw new Error('Unauthorized Access!');
        }
        return response.json();
      })
      .then(data => {
        if(data.success) {
          document.getElementById('letter-content').innerHTML = data.content;
        }
      })
      .catch(error => {
        // 5. Fallback for Guests
        document.getElementById('letter-content').innerHTML = `
        <div style="text-align: center; margin-top: 80px;">
          <span style="font-size: 1.5rem; color: #4d2902;">Sealed Memory</span>
          <br /><br />
          You are currently viewing as a guest.<br />
          You are not authorized to view the contents of this letter,<br />
          but please feel free to enjoy the photos beside it!
          <br /><br /><br />
          <span class="ullu">
            Enjoy!
        </span>
      </div>
        `;
      });
  </script>

  <footer>
    <p>Lovingly crafted by <a href="https://www.instagram.com/gerymeeee?igsh=dGZwYzQzOWoxZmY2" id="name-link">Geryme</a></p>
  </footer>
</body>
</html>
